global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: orders-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["orders-service:8081"]

  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["inventory-service:8082"]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8083"]

  - job_name: rabbitmq
    # /metrics only exposes cluster-wide aggregates; per-queue series (what
    # the "queue depth" dashboard panel needs) live under /metrics/per-object.
    metrics_path: /metrics/per-object
    static_configs:
      - targets: ["rabbitmq:15692"]
