# Built locally and loaded straight into the kind cluster (see k8s/README.md) —
# there is no registry push in this local-only setup, so the tag is a fixed
# "local" rather than a git sha/version, and pullPolicy stays IfNotPresent
# instead of Always.
image:
  repository: notification-service
  tag: local
  pullPolicy: IfNotPresent

# Safe to raise above 1: both consumers (order.confirmed / order.cancelled)
# are idempotent on notification id, so duplicate deliveries across pods
# can't create duplicate notifications.
replicaCount: 1

service:
  port: 8083
  # Mapped to host localhost:8083 by k8s/kind-config.yaml, so the API is
  # reachable at the same URL whether the stack runs on docker compose or kind.
  nodePort: 30083

resources:
  requests:
    cpu: 250m
    memory: 384Mi
  limits:
    cpu: "1"
    memory: 512Mi

env:
  dbHost: notifications-db
  dbPort: 5432
  dbName: notifications_db
  dbUser: notifications_user
  dbPasswordSecretName: notifications-db-credentials
  dbPasswordSecretKey: password
  rabbitmqHost: rabbitmq
  rabbitmqPort: 5672
  rabbitmqUser: guest
  rabbitmqPasswordSecretName: rabbitmq-credentials
  rabbitmqPasswordSecretKey: password
  otlpTracingEndpoint: http://jaeger:4318/v1/traces

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 45
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 20
