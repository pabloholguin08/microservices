{{/*
  One StatefulSet + headless Service + credentials Secret per instance in
  .Values.postgres.instances. The three databases are ~identical (same image,
  same resource shape, same probes) and only differ in name/db/user/password,
  so a single templated range is more readable than three near-duplicate
  files a reviewer would have to diff by eye to confirm they actually match.
*/}}
{{- range .Values.postgres.instances }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .name }}-credentials
type: Opaque
stringData:
  password: {{ .password | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  labels:
    app: {{ .name }}
spec:
  # Headless: StatefulSet pods get stable DNS (e.g. orders-db-0.orders-db),
  # though the app services only ever address the Service name directly
  # since there's exactly one replica.
  clusterIP: None
  selector:
    app: {{ .name }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .name }}
  labels:
    app: {{ .name }}
spec:
  serviceName: {{ .name }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      # uid 999 is the postgres image's own "postgres" user; fsGroup makes
      # the mounted PVC writable by it.
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: {{ $.Values.postgres.image }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .database | quote }}
            - name: POSTGRES_USER
              value: {{ .username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .name }}-credentials
                  key: password
            # Postgres refuses to initdb straight into a volume's mount
            # point if it isn't empty (lost+found etc.); a subdirectory sidesteps that.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .username | quote }}, "-d", {{ .database | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .username | quote }}, "-d", {{ .database | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml $.Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if $.Values.postgres.storageClassName }}
        storageClassName: {{ $.Values.postgres.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ $.Values.postgres.storageSize }}
{{- end }}
