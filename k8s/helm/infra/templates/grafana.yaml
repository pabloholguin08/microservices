{{/*
  Provisioning files and dashboard JSON are static (they don't depend on
  .Values), so they live under files/grafana/ and get embedded verbatim
  here rather than re-typed into template strings.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-datasources
data:
  datasource.yml: |-
{{ .Files.Get "files/grafana/datasource.yml" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-dashboards
data:
  dashboard.yml: |-
{{ .Files.Get "files/grafana/dashboard-provider.yml" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  pedidos-overview.json: |-
{{ .Files.Get "files/grafana/pedidos-overview.json" | indent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
type: Opaque
stringData:
  username: {{ .Values.grafana.adminUser | quote }}
  password: {{ .Values.grafana.adminPassword | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      # uid 472 is the official image's own "grafana" user.
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        runAsGroup: 472
      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: username
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: password
            # Local demo only: lets anyone reach the dashboards read-only
            # without logging in, same as docker-compose.
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            # No PVC for /var/lib/grafana: everything that matters
            # (datasource, dashboard) is re-provisioned from the ConfigMaps
            # above on every pod start, so losing Grafana's own sqlite state
            # on a restart costs nothing for this demo.
            - name: data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
      volumes:
        - name: datasources
          configMap:
            name: grafana-provisioning-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-provisioning-dashboards
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: {{ .Values.grafana.nodePort }}
