apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  # Same scrape config as observability/prometheus/prometheus.yml, with
  # targets swapped from docker-compose service names to their k8s
  # equivalents (both resolve the same way: short names within one
  # namespace). /metrics/per-object, not /metrics, for RabbitMQ — the
  # default path only exposes cluster-wide aggregates, and the "queue depth"
  # dashboard panel needs the per-queue series.
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: orders-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["orders-service:8081"]

      - job_name: inventory-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["inventory-service:8082"]

      - job_name: notification-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["notification-service:8083"]

      - job_name: rabbitmq
        metrics_path: /metrics/per-object
        static_configs:
          - targets: ["rabbitmq:15692"]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.prometheus.storageClassName }}
  storageClassName: {{ .Values.prometheus.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.prometheus.storageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  replicas: 1
  strategy:
    # The single PVC below is ReadWriteOnce; never run two pods against it.
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      # uid 65534 ("nobody") is what the official image's TSDB ends up
      # owned by once a fresh PVC is mounted; fsGroup grants it write access.
      securityContext:
        fsGroup: 65534
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image }}
          # No readOnlyRootFilesystem: Prometheus's TSDB (WAL + blocks)
          # writes throughout /prometheus, not just the mounted volume's
          # subdirectory — see docs/observability.md for how this was found.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: {{ .Values.prometheus.nodePort }}
